<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Abid Shah – Library Professional & Information Specialist</title>
<link href="https://googleapis.com" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #10101a;
    --surface2: #14141f;
    --border: #22223a;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text: #e8e8f2;
    --muted: #6868a0;
    --font-head: 'Syne', sans-serif;
    --font-mono: 'Space Mono', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 14px;
    line-height: 1.75;
  }

  /* ── NAV ── */
  nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,16,0.88);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.85rem 2.5rem;
  }
  .nav-logo {
    font-family: var(--font-head); font-size: 1.05rem; font-weight: 800;
    color: var(--accent); letter-spacing: -0.01em; text-decoration: none;
  }
  .nav-links { display: flex; gap: 2rem; list-style: none; }
  .nav-links a {
    color: var(--muted); text-decoration: none; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.12em; transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--accent); }

  /* ── HERO ── */
  .hero {
    min-height: 100vh; display: flex; align-items: center;
    padding: 5rem 2.5rem 4rem; position: relative; overflow: hidden;
  }
  .hero-glow1 {
    position: absolute; top: -120px; right: -80px;
    width: 520px; height: 520px; border-radius: 50%;
    background: radial-gradient(circle, rgba(110,231,183,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-glow2 {
    position: absolute; bottom: -60px; left: -60px;
    width: 420px; height: 420px; border-radius: 50%;
    background: radial-gradient(circle, rgba(129,140,248,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 900px; margin: 0 auto; width: 100%; z-index: 1;
    display: flex; align-items: center; gap: 4rem; flex-wrap: wrap;
  }
  .hero-text { flex: 1; min-width: 280px; }
  .hero-photo-wrap { flex-shrink: 0; }
  .hero-photo {
    width: 200px; height: 200px; border-radius: 50%;
    object-fit: cover; object-position: top center;
    border: 3px solid var(--accent);
    box-shadow: 0 0 0 8px rgba(110,231,183,0.08), 0 0 40px rgba(110,231,183,0.12);
    display: block;
    background: var(--surface);
  }
  
  .hero-tag {
    display: inline-block;
    background: rgba(110,231,183,0.08); border: 1px solid rgba(110,231,183,0.22);
    color: var(--accent); font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase; padding: 4px 14px; border-radius: 3px; margin-bottom: 1.5rem;
  }
  .hero-name {
    font-family: var(--font-head); font-size: clamp(2.6rem, 7vw, 4.2rem);
    font-weight: 800; line-height: 1.05; letter-spacing: -0.03em;
    color: var(--text); margin-bottom: 0.4rem;
  }
  .hero-name span { color: var(--accent); }
  .hero-role {
    font-family: var(--font-head); font-size: 1.1rem; font-weight: 400;
    color: var(--muted); margin-bottom: 1.4rem;
  }
  .hero-bio {
    color: var(--muted); font-size: 13px; max-width: 460px;
    line-height: 1.95; margin-bottom: 2.2rem;
  }
  .hero-cta { display: flex; gap: 1rem; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: #080810; border: none;
    padding: 11px 26px; font-family: var(--font-mono); font-size: 12px;
    font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
    border-radius: 4px; cursor: pointer; text-decoration: none; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-ghost {
    background: transparent; color: var(--muted);
    border: 1px solid var(--border); padding: 11px 26px;
    font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.06em;
    text-transform: uppercase; border-radius: 4px; cursor: pointer;
    text-decoration: none; transition: border-color 0.2s, color 0.2s;
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── DIVIDER ── */
  .divider {
    max-width: 900px; margin: 0 auto; height: 1px;
    background: linear-gradient(to right, transparent, var(--border), transparent);
  }

  /* ── SECTIONS ── */
  section { max-width: 900px; margin: 0 auto; padding: 5rem 2.5rem; }
  .section-label {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--accent); margin-bottom: 0.5rem;
  }
  .section-title {
    font-family: var(--font-head); font-size: 1.9rem; font-weight: 800;
    color: var(--text); margin-bottom: 2.5rem; letter-spacing: -0.02em;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;
  }
  .skill-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.4rem 1rem; text-align: center;
    transition: border-color 0.25s, transform 0.25s;
  }
  .skill-card:hover { border-color: var(--accent); transform: translateY(-3px); }
  .skill-icon { font-size: 1.8rem; margin-bottom: 0.6rem; display: block; }
  .skill-name {
    font-family: var(--font-head); font-size: 0.95rem; font-weight: 600; color: var(--text);
  }
  .skill-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* ── EXPERIENCE ── */
  .exp-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem;
    transition: border-color 0.2s;
  }
  .exp-card:hover { border-color: rgba(110,231,183,0.3); }
  .exp-year {
    font-size: 11px; color: var(--accent); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .exp-title {
    font-family: var(--font-head); font-size: 1.05rem; font-weight: 600;
    color: var(--text); margin-bottom: 3px;
  }
  .exp-organization { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .exp-detail { font-size: 12px; color: var(--muted); line-height: 1.6; }

  /* ── EDUCATION ── */
  .timeline { position: relative; padding-left: 2rem; }
  .timeline::before {
    content: ''; position: absolute; left: 0; top: 8px; bottom: 8px;
    width: 1px; background: linear-gradient(to bottom, var(--accent), var(--accent2), transparent);
  }
  .timeline-item { position: relative; margin-bottom: 2.5rem; }
  .timeline-item:last-child { margin-bottom: 0; }
  .timeline-dot {
    position: absolute; left: -2.48rem; top: 7px;
    width: 11px; height: 11px; border-radius: 50%;
    background: var(--accent); border: 2px solid var(--bg);
    box-shadow: 0 0 8px rgba(110,231,183,0.4);
  }
  .edu-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.3rem 1.5rem;
    transition: border-color 0.2s;
  }
  .edu-card:hover { border-color: rgba(110,231,183,0.3); }
  .edu-year {
    font-size: 11px; color: var(--accent); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 5px;
  }
  .edu-institution {
    font-family: var(--font-head); font-size: 1.05rem; font-weight: 600;
    color: var(--text); margin-bottom: 3px;
  }
  .edu-detail { font-size: 12px; color: var(--muted); }

  /* ── INTERESTS ── */
  .interest-grid {
    display: flex; flex-wrap: wrap; gap: 0.8rem;
  }
  .interest-tag {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--muted); padding: 8px 18px; border-radius: 30px; font-size: 12px;
    display: flex; align-items: center; gap: 8px;
    transition: border-color 0.2s, color 0.2s;
  }
  .interest-tag:hover { border-color: var(--accent2); color: var(--accent2); }
  .interest-icon { font-size: 1rem; }

  /* ── CONTACT ── */
  .contact-grid {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1rem;
  }
  .contact-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 1.5rem; text-align: center;
    transition: border-color 0.2s; text-decoration: none; display: block;
  }
  .contact-card:hover { border-color: var(--accent); }
  .contact-icon { font-size: 1.8rem; margin-bottom: 0.5rem; display: block; }
  .contact-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .contact-value { font-family: var(--font-head); font-size: 1rem; color: var(--text); font-weight: 600; margin-top: 2px; }

  /* ── FOOTER ── */
  footer {
    max-width: 900px; margin: 0 auto; padding: 3rem 2.5rem;
    border-top: 1px solid var(--border); text-align: center;
    font-size: 11px; color: var(--muted); letter-spacing: 0.05em;
  }

  @media (max-width: 768px) {
    nav { padding: 1rem 1.5rem; flex-direction: column; gap: 1rem; }
    .hero { padding: 4rem 1.5rem 3rem; }
    .hero-inner { gap: 2rem; justify-content: center; text-align: center; }
    .hero-bio { margin-left: auto; margin-right: auto; }
    .hero-cta { justify-content: center; }
    section { padding: 4rem 1.5rem; }
  }
</style>
</head>
<body>

  <nav>
    <a href="#" class="nav-logo">ABID SHAH</a>
    <ul class="nav-links">
      <li><a href="#about">About</a></li>
      <li><a href="#skills">Skills</a></li>
      <li><a href="#experience">Experience</a></li>
      <li><a href="#education">Education</a></li>
      <li><a href="#contact">Contact</a></li>
    </ul>
  </nav>

  <main>
    <section class="hero" id="about">
      <div class="hero-glow1"></div>
      <div class="hero-glow2"></div>
      <div class="hero-inner">
        <div class="hero-text">
          <span class="hero-tag">Portfolio</span>
